name: Build and Re-register Image

on:
  push:
    branches: [ "main" ]  # Triggers whenever you push to the 'main' branch
  workflow_dispatch:      # Allows you to run it manually from the GitHub UI

env:
  REGISTRY: ghcr.io
  # This will name the image 'ghcr.io/anamikasingh/demo-one'
  IMAGE_NAME: ghcr.io/asingh3495/demo-one

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # This automatically creates tags: 'latest' and the Git Commit SHA
          tags: |
            type=raw,value=latest,force=true
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
          # This speeds up future builds by caching layers on GitHub
          cache-from: type=gha
          cache-to: type=gha,mode=max
